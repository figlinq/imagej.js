    <script>
      window.ipfCreateIFrame = function() {
        var ret = document.createElement("iframe");
        ret.onload = function(e) {
          clearInterval(IFrameProxyDownloader.intervalId);
          var i = e.target;
          var c = new MessageChannel();
          var q = IFrameProxyDownloader.portOrQueue;
          c.port1.onmessage = ipfMessage;
          IFrameProxyDownloader.portOrQueue = c.port1;
          i.contentWindow.postMessage(
            { t: "port", port: c.port2 },
            location.origin,
            [c.port2]
          );
          // Dispatch pending loads
          for (var i = 0; i < q.length; i = (i + 1) | 0) q[i].send();
        };
        ret.src = "c.html";
        ret.width = "0px";
        ret.height = "0px";
        ret.style.border = "0px";
        ret.style.position = "fixed";
        ret.style.visibility = "hidden";
        IFrameProxyDownloader.iframe = ret;
        if (document.body) document.body.appendChild(ret);
        else
          document.addEventListener("DOMContentLoaded", function(e) {
            document.body.appendChild(IFrameProxyDownloader.iframe);
          });
        IFrameProxyDownloader.intervalId = setInterval(function() {
          IFrameProxyDownloader.iframe.src = "c.html";
        }, 10000);
      };

      // Check if we're in an iframe
      const isInIframe = window.self !== window.top;
      
      // Clean up old service workers when in iframe
      if ('serviceWorker' in navigator && isInIframe) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) {
            console.log('[ImageJ] Unregistering service worker in iframe context');
            registration.unregister();
          });
        });
      }
      
      document.addEventListener(
        "DOMContentLoaded",
        function() {
          // Only register service worker if NOT in iframe
          // Service workers in iframes can cause caching conflicts
          if (!isInIframe) {
            registerServiceWorker();
          } else {
            console.log("Skipping service worker registration in iframe context");
          }
        },
        false
      );
      
      // Always start ImageJ, but with a more robust approach
      function startImageJWhenReady() {
        if (typeof startImageJ === 'function') {
          startImageJ();
        } else {
          // If startImageJ is not ready, try again in 100ms
          setTimeout(startImageJWhenReady, 100);
        }
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener("DOMContentLoaded", startImageJWhenReady, false);
      } else {
        // DOM is already loaded (common in iframes)
        startImageJWhenReady();
      }
    </script>

    <script>
      // After ImageJ is ready, add File menu items for Figlinq integration
      (function() {
        async function insertFileMenuItems() {
          const getMenuUl = () =>
            document.querySelector(
              "#cheerpjDisplay>.window>div.menuBar>.menu>.menuItem:nth-child(1)>ul"
            );
          if (!window.ij || !getMenuUl()) {
            setTimeout(insertFileMenuItems, 300);
            return;
          }
          const ij = window.ij;
          try {
            let menuUl = getMenuUl();
            if (!menuUl) return;
            const labels = Array.from(menuUl.children).map(
              (li) =>
                (li.querySelector("a") && li.querySelector("a").textContent) ||
                ""
            );

            // Add: Save PNG to Figlinq
            if (!labels.includes("Save PNG to Figlinq")) {
              const liSave = document.createElement("li");
              liSave.classList.add("menuItem", "subMenuItem");
              const aSave = document.createElement("a");
              aSave.textContent = "Save PNG to Figlinq";
              liSave.appendChild(aSave);
              liSave.onclick = async () => {
                try {
                  const imp = await ij.getImage();
                  if (!imp) throw new Error("No active image");
                  const filename = cjStringJavaToJs(
                    await cjCall(imp, "getTitle")
                  );
                  const javaBytes = await ij.saveAsBytes(imp, "png");
                  const arrayBuffer = javaBytes.slice(1).buffer;
                  const blob = new Blob([arrayBuffer], { type: "image/png" });

                  const handleFiglinqSaveMessage = (event) => {
                    if (
                      event.data &&
                      (event.data.type === "figlinq-file-saved" ||
                        event.data.type === "figlinq-save-cancelled")
                    ) {
                      window.removeEventListener(
                        "message",
                        handleFiglinqSaveMessage
                      );
                    }
                  };
                  window.addEventListener("message", handleFiglinqSaveMessage);
                  window.parent.postMessage(
                    {
                      action: "upload-file",
                      filename,
                      imageData: blob,
                      imageType: "image/png",
                    },
                    "*"
                  );
                } catch (error) {
                  console.error("Failed to save image to Figlinq:", error);
                }
              };
              menuUl.insertBefore(liSave, menuUl.firstChild);
            }

            // Add: Load image from Figlinq
            if (!labels.includes("Load image from Figlinq")) {
              const liLoad = document.createElement("li");
              liLoad.classList.add("menuItem", "subMenuItem");
              const aLoad = document.createElement("a");
              aLoad.textContent = "Load image from Figlinq";
              liLoad.appendChild(aLoad);
              liLoad.onclick = async () => {
                const handleFiglinqMessage = async (event) => {
                  if (
                    event.data &&
                    event.data.type === "selected-figlinq-file"
                  ) {
                    window.removeEventListener("message", handleFiglinqMessage);
                    const file = event.data.file;
                    if (!file) return; // user cancelled
                    try {
                      const name = file.name || "image";
                      const filepath = "/str/" + name;
                      const buffer = await (file.arrayBuffer
                        ? file.arrayBuffer()
                        : new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result);
                            reader.onerror = reject;
                            reader.readAsArrayBuffer(file);
                          }));
                      cheerpjAddStringFile(filepath, new Uint8Array(buffer));
                      await ij.open(filepath).finally(() => {
                        try {
                          cheerpjRemoveStringFile(filepath);
                        } catch (e) {
                          /* noop */
                        }
                      });
                    } catch (e) {
                      console.error("Failed to load selected Figlinq file:", e);
                    }
                  }
                };
                window.addEventListener("message", handleFiglinqMessage);
                window.parent.postMessage(
                  { action: "select-figlinq-file" },
                  "*"
                );
              };
              menuUl.insertBefore(liLoad, menuUl.firstChild);
            }

            // Add '-' separator
            menuUl = getMenuUl();
            const liSep = document.createElement("li");
            liSep.classList.add("menuItem");
            const aSep = document.createElement("a");
            aSep.innerHTML = "-";
            liSep.appendChild(aSep);
            menuUl.insertBefore(liSep, menuUl.children[2]);
          } catch (e) {
            console.error("Failed to add Figlinq menu items:", e);
          }
        }
        insertFileMenuItems();
      })();
    </script>
